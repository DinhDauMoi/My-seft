<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Trại Pokémon | Pixel Ranch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                "colors": {
                    "primary": "#97a9ff", "primary-dim": "#3e65ff", "secondary": "#bf81ff",
                    "tertiary": "#a1faff", "on-surface": "#ecedf6", "on-surface-variant": "#a9abb3",
                    "surface": "#0b0e14", "surface-container": "#161a21",
                    "surface-container-highest": "#22262f", "outline": "#73757d",
                    "background": "#0b0e14", "error": "#ff6e84"
                },
                "fontFamily": { "headline": ["Space Grotesk"], "body": ["Manrope"], "label": ["Manrope"] }
            }}
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ranch-specific styles */
        .ranch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        @media (min-width: 768px) { .ranch-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }

        .poke-cell {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); background: rgba(34,38,47,0.3);
            backdrop-filter: blur(8px); cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .poke-cell:hover { border-color: rgba(151,169,255,0.4); background: rgba(34,38,47,0.6); transform: scale(1.08); z-index: 10; }
        .poke-cell:hover .poke-name { opacity: 1; }
        .poke-cell:hover img { filter: brightness(1.3) drop-shadow(0 0 8px rgba(255,215,0,0.6)); }
        .poke-cell.clicked { animation: catch-shake 0.5s ease; }

        .poke-img {
            width: 64px; height: 64px; image-rendering: pixelated;
            animation: poke-bounce var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
        }
        .poke-name {
            font-size: 9px; color: #a9abb3; margin-top: 2px; text-align: center;
            font-family: 'Manrope', sans-serif; opacity: 0; transition: opacity 0.3s;
            text-transform: capitalize; letter-spacing: 0.5px;
        }
        .poke-id {
            position: absolute; top: 4px; right: 6px; font-size: 8px; color: rgba(255,255,255,0.15);
            font-family: monospace;
        }

        @keyframes poke-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes catch-shake {
            0%, 100% { transform: scale(1) rotate(0); }
            20% { transform: scale(1.15) rotate(-8deg); }
            40% { transform: scale(1.15) rotate(8deg); }
            60% { transform: scale(1.1) rotate(-4deg); }
            80% { transform: scale(1.05) rotate(2deg); }
        }
        @keyframes float-in { from { opacity: 0; transform: translateY(20px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .search-box {
            background: rgba(22,26,33,0.8); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px); border-radius: 16px; padding: 14px 20px;
            color: #ecedf6; font-family: 'Manrope'; font-size: 15px; width: 100%;
            outline: none; transition: border-color 0.3s;
        }
        .search-box:focus { border-color: rgba(151,169,255,0.5); }
        .search-box::placeholder { color: rgba(169,171,179,0.5); }

        .gen-btn {
            padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 600;
            font-family: 'Space Grotesk'; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(22,26,33,0.6); color: #a9abb3; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .gen-btn:hover, .gen-btn.active { background: rgba(62,101,255,0.2); border-color: rgba(62,101,255,0.4); color: #97a9ff; }

        .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; }
        .stat-chip {
            padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 600;
            font-family: 'Space Grotesk'; background: rgba(34,38,47,0.5); color: #a9abb3;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-chip span { color: #97a9ff; }

        /* Loading skeleton */
        .poke-cell.loading { animation: pulse-bg 1.5s ease-in-out infinite; }
        @keyframes pulse-bg { 0%, 100% { background: rgba(34,38,47,0.2); } 50% { background: rgba(34,38,47,0.5); } }
    </style>
</head>
<body class="bg-surface min-h-screen select-none">
    <div class="cursor-glow"></div>

    <!-- TopAppBar -->
    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl rounded-2xl border border-white/10 bg-slate-900/40 backdrop-blur-xl flex justify-between items-center px-6 py-3 z-50 shadow-[0px_0px_40px_rgba(62,101,255,0.08)]">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-2xl font-black tracking-tighter bg-gradient-to-r from-[#3e65ff] to-[#bf81ff] bg-clip-text text-transparent font-['Space_Grotesk']">V.</a>
        </div>
        <div class="flex items-center gap-6">
            <a class="hidden md:block text-on-surface-variant font-bold hover:text-white transition-colors font-['Space_Grotesk'] tracking-tight" href="index.html">Trang chủ</a>
            <span class="text-white font-bold border-b border-blue-500 font-['Space_Grotesk'] tracking-tight">Trại Pokémon</span>
        </div>
    </nav>

    <main class="relative pt-28 pb-20 px-4 md:px-6 max-w-7xl mx-auto">
        <!-- Background Glows -->
        <div class="fixed top-[-10%] right-[-20%] w-[80%] h-[50%] bg-primary-dim/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
        <div class="fixed bottom-[10%] left-[-20%] w-[80%] h-[50%] bg-secondary/10 blur-[120px] rounded-full pointer-events-none z-0"></div>

        <!-- Header -->
        <section class="relative z-10 text-center mb-8">
            <h1 class="text-4xl md:text-6xl font-black font-['Space_Grotesk'] tracking-tighter mb-3 text-white">
                Trại <span class="bg-gradient-to-r from-[#FFD700] via-[#ff6e84] to-[#bf81ff] bg-clip-text text-transparent">Pokémon</span>
            </h1>
            <p class="text-on-surface-variant text-base md:text-lg font-['Manrope'] max-w-xl mx-auto">
                Tất cả 1025 Pokémon pixel — từ Gen I đến Gen IX. Click vào bất kỳ Pokémon nào!
            </p>
        </section>

        <!-- Controls -->
        <section class="relative z-10 mb-6 space-y-4">
            <div class="flex flex-col md:flex-row gap-4 items-stretch md:items-center">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-sm"></i>
                    <input id="searchInput" type="text" class="search-box pl-10" placeholder="Tìm Pokémon theo tên hoặc số...">
                </div>
                <div class="stats-bar" id="statsBar">
                    <div class="stat-chip">Tổng: <span id="totalCount">1025</span></div>
                    <div class="stat-chip">Hiện: <span id="visibleCount">1025</span></div>
                </div>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="genFilters">
                <button class="gen-btn active" data-gen="all">Tất cả</button>
                <button class="gen-btn" data-gen="1">Gen I</button>
                <button class="gen-btn" data-gen="2">Gen II</button>
                <button class="gen-btn" data-gen="3">Gen III</button>
                <button class="gen-btn" data-gen="4">Gen IV</button>
                <button class="gen-btn" data-gen="5">Gen V</button>
                <button class="gen-btn" data-gen="6">Gen VI</button>
                <button class="gen-btn" data-gen="7">Gen VII</button>
                <button class="gen-btn" data-gen="8">Gen VIII</button>
                <button class="gen-btn" data-gen="9">Gen IX</button>
            </div>
        </section>

        <!-- Pokemon Grid -->
        <section class="relative z-10">
            <div class="ranch-grid" id="ranchGrid"></div>
            <div id="loadingMore" class="text-center py-8 text-on-surface-variant/50 font-['Manrope'] text-sm hidden">
                Đang tải thêm Pokémon...
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="w-full border-t border-white/5 mt-10 bg-[#0b0e14] relative z-10">
        <div class="flex flex-col md:flex-row justify-between items-center px-8 py-8 gap-4 max-w-7xl mx-auto">
            <p class="font-['Manrope'] text-xs tracking-widest uppercase text-slate-500">
                © 2026 MamaBoii <i class="fa-solid fa-heart text-red-500 text-sm"></i> Pixel Pokémon Ranch
            </p>
            <a class="font-['Manrope'] text-xs tracking-widest uppercase text-slate-500 hover:text-[#a1faff] transition-colors" href="index.html">← Về trang chủ</a>
        </div>
    </footer>

    <script src="ranch.js"></script>
</body>
</html>
